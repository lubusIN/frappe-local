<?xml version="1.0" encoding="utf-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium, sleek light-mode macOS gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCFCFD" />
      <stop offset="100%" stop-color="#EEF0F3" />
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="600" height="400" fill="url(#bg-grad)" />

  <!-- Ultra-Premium Sleek Minimalist Arrow -->
  <path d="M 270 200 L 330 200 M 320 190 L 330 200 L 320 210" 
        stroke="#8E8E93" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
