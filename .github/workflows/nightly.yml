name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly-release:
    runs-on: ubuntu-latest
    outputs:
      nightly_version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Check for Changes and Generate Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            COMMITS=$(git log --since="24 hours ago" --oneline)
            if [ -z "$COMMITS" ]; then
              echo "No changes in the last 24 hours. Skipping nightly build."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          # Get the current base version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version.split('-')[0])")
          DATE=$(date +'%Y%m%d')
          NIGHTLY_VERSION="${CURRENT_VERSION}-nightly.${DATE}"
          
          echo "version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Created version $NIGHTLY_VERSION"

      - name: Recreate Rolling Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the old nightly release and tag if they exist
          gh release delete nightly --cleanup-tag -y || true
          
          # Ensure remote tag is cleaned up even if release deletion failed (e.g., if release did not exist)
          git push origin :refs/tags/nightly || true
          
          # Force create new tag locally (overwrites tag fetched during checkout) and push
          git tag -f nightly
          git push origin nightly --force
          
          # Create a fresh release
          gh release create nightly \
            --title "Nightly Build v${{ steps.version.outputs.version }}" \
            --prerelease \
            --notes "Rolling nightly build containing the latest changes."

  build-and-upload:
    needs: nightly-release
    if: needs.nightly-release.outputs.skip != 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: nightly
      override_version: ${{ needs.nightly-release.outputs.nightly_version }}
