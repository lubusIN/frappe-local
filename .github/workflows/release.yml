name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            arch: x64
            artifact: linux-x64
          - name: macOS Apple Silicon
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
          - name: Windows x64
            runner: windows-latest
            arch: x64
            artifact: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Verify runner architecture
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: node -e "const expected = process.env.EXPECTED_ARCH; if (process.arch !== expected) throw new Error('Expected ' + expected + ', got ' + process.arch); console.log(process.platform + '-' + process.arch)"

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ''
          ELECTRON_SKIP_DOWNLOAD: ''
          npm_config_ignore_scripts: 'false'
        run: npm ci --foreground-scripts

      - name: Install Electron binary
        run: >-
          node -e "delete process.env.ELECTRON_SKIP_BINARY_DOWNLOAD;
          delete process.env.ELECTRON_SKIP_DOWNLOAD;
          require('./node_modules/electron/install.js')"

      - name: Verify Electron installation
        env:
          WORKFLOW_COMMIT: ${{ github.sha }}
        run: >-
          node -e "const fs = require('fs'); const path = require('path');
          console.log('Workflow commit:', process.env.WORKFLOW_COMMIT);
          const root = path.dirname(require.resolve('electron/package.json'));
          const pathFile = path.join(root, 'path.txt');
          if (!fs.existsSync(pathFile)) throw new Error('Electron path.txt is missing after explicit Electron install');
          const executable = fs.readFileSync(pathFile, 'utf8').trim();
          const binary = path.join(root, 'dist', executable);
          if (!fs.existsSync(binary)) throw new Error('Electron executable is missing: ' + binary);
          console.log('Electron executable:', binary)"

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Build and Package App
        run: npm run make

      - name: Validate Artifacts
        run: npm run artifacts:validate

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: local-bench-${{ matrix.artifact }}
          path: |
            out/make/**/*.zip
            out/make/**/*.dmg
            out/make/**/*.exe
            out/make/**/*.deb
            out/make/**/*.rpm
          retention-days: 1

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -R release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
