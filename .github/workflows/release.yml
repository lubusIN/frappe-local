name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
        description: 'Tag name for the release'
      override_version:
        required: false
        type: string
        description: 'Optional semantic version to inject ephemerally'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            arch: x64
            artifact: linux-x64
          - name: macOS Apple Silicon
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
          - name: Windows x64
            runner: windows-latest
            arch: x64
            artifact: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Verify runner architecture
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: node -e "const expected = process.env.EXPECTED_ARCH; if (process.arch !== expected) throw new Error('Expected ' + expected + ', got ' + process.arch); console.log(process.platform + '-' + process.arch)"

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot rpm

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Inject Override Version
        if: inputs.override_version != ''
        run: npm version ${{ inputs.override_version }} --no-git-tag-version

      - name: Build and Package App
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: npm run release:make

      - name: Generate electron-updater Manifests
        if: github.event_name == 'release' || github.event_name == 'workflow_call'
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
          OVERRIDE_VERSION: ${{ inputs.override_version }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');
            
            const tag = process.env.RELEASE_TAG || '';
            const injectedVersion = process.env.OVERRIDE_VERSION || '';
            const finalVersion = injectedVersion || tag.replace(/^v/, ''); // electron-updater version is purely semver without the v
            
            let channel = 'latest';
            if (tag.includes('nightly')) channel = 'nightly';
            else if (tag.includes('-alpha')) channel = 'alpha';
            else if (tag.includes('-beta')) channel = 'beta';
            
            const isMac = process.platform === 'darwin';
            const isWin = process.platform === 'win32';
            
            let suffix = isMac ? '-mac' : (isWin ? '' : '-linux');
            const yamlFilename = \`\${channel}\${suffix}.yml\`;
            
            const artifactsDir = path.join(process.cwd(), 'release-artifacts');
            if (!fs.existsSync(artifactsDir)) {
              console.log('No release-artifacts directory found. Skipping.');
              process.exit(0);
            }
            
            const files = fs.readdirSync(artifactsDir);
            // Forge generates .zip for macOS, .exe for Windows, .rpm/.deb for Linux. 
            // The auto updater relies on zip for mac, exe for win, AppImage/snap for linux (but forge outputs rpm/deb? Wait, let's use whatever zip or exe it creates). 
            // To be robust, let's just find the main distributable.
            let extToMatch = '.zip';
            if (isWin) extToMatch = '.exe';
            if (!isMac && !isWin) extToMatch = '.rpm'; // Or .deb, usually electron-updater uses AppImage. We will just find any installer if AppImage is missing.
            
            let targetFile = files.find(f => f.endsWith(extToMatch));
            if (!isMac && !isWin && !targetFile) targetFile = files.find(f => f.endsWith('.deb'));
            if (!isMac && !isWin && !targetFile) targetFile = files.find(f => f.endsWith('.AppImage'));
            
            if (!targetFile) {
              console.log('No suitable artifact found to generate manifest for.', files);
              process.exit(0);
            }
            
            const filePath = path.join(artifactsDir, targetFile);
            const stat = fs.statSync(filePath);
            
            const hash = crypto.createHash('sha512');
            hash.update(fs.readFileSync(filePath));
            const sha512 = hash.digest('base64');
            
            const yamlContent = \`version: \${finalVersion}
          files:
            - url: \${targetFile}
              sha512: \${sha512}
              size: \${stat.size}
          path: \${targetFile}
          sha512: \${sha512}
          releaseDate: '\${new Date().toISOString()}'\`.replace(/^          /gm, '');
            
            fs.writeFileSync(path.join(artifactsDir, yamlFilename), yamlContent);
            console.log('Generated manifest:', yamlFilename);
            console.log(yamlContent);
          "

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frappe-local-${{ matrix.artifact }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_call'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: frappe-local-*
          path: release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          tag_name: ${{ inputs.tag_name || github.event.release.tag_name }}
