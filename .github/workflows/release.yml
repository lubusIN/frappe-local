name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
        description: 'Tag name for the release'
      override_version:
        required: false
        type: string
        description: 'Optional semantic version to inject ephemerally'
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
        description: 'Tag name for the release'
      override_version:
        required: false
        type: string
        description: 'Optional semantic version to inject ephemerally'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            arch: x64
            artifact: linux-x64
          - name: macOS Apple Silicon
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
          - name: Windows x64
            runner: windows-latest
            arch: x64
            artifact: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Verify runner architecture
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: node -e "const expected = process.env.EXPECTED_ARCH; if (process.arch !== expected) throw new Error('Expected ' + expected + ', got ' + process.arch); console.log(process.platform + '-' + process.arch)"

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot rpm

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Inject Override Version
        if: inputs.override_version != ''
        run: npm version ${{ inputs.override_version }} --no-git-tag-version

      - name: Build and Package App
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: npm run release:make

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frappe-local-${{ matrix.artifact }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_call'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: frappe-local-*
          path: release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          tag_name: ${{ inputs.tag_name || github.event.release.tag_name }}
